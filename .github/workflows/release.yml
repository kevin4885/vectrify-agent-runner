name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Build and publish
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build all platforms
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          mkdir -p dist
          LDFLAGS="-s -w -X vectrify/agent-runner/config.Version=${VERSION}"

          GOOS=windows GOARCH=amd64 go build -ldflags "$LDFLAGS" -o dist/vectrify-runner-windows-amd64.exe .
          GOOS=linux   GOARCH=amd64 go build -ldflags "$LDFLAGS" -o dist/vectrify-runner-linux-amd64 .
          GOOS=linux   GOARCH=arm64 go build -ldflags "$LDFLAGS" -o dist/vectrify-runner-linux-arm64 .
          GOOS=darwin  GOARCH=amd64 go build -ldflags "$LDFLAGS" -o dist/vectrify-runner-darwin-amd64 .
          GOOS=darwin  GOARCH=arm64 go build -ldflags "$LDFLAGS" -o dist/vectrify-runner-darwin-arm64 .

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "v${{ steps.version.outputs.version }}"
          generate_release_notes: true
          files: |
            dist/vectrify-runner-windows-amd64.exe
            dist/vectrify-runner-linux-amd64
            dist/vectrify-runner-linux-arm64
            dist/vectrify-runner-darwin-amd64
            dist/vectrify-runner-darwin-arm64
            install.sh
            install.ps1
